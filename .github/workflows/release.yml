name: Build and Release AuraPlayer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform_name: Windows
            artifact_name: AuraPlayer_Windows.zip
          - os: macos-latest
            platform_name: macOS
            artifact_name: AuraPlayer_macOS.zip
          - os: ubuntu-22.04
            platform_name: Linux
            artifact_name: AuraPlayer_Linux.tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libdbus-1-3 || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install Pillow pyinstaller

      - name: Run Icon Automation Script
        run: |
          python generate_icons.py

      - name: Build with PyInstaller
        run: |
          pyinstaller auraplayer.spec --clean

      # Windows-Specific Installer Step
      - name: Compile Inno Setup Installer
        if: matrix.os == 'windows-latest'
        run: |
          # Windows-latest runners have ISCC pre-installed and available in PATH
          iscc installer.iss

      # Packaging Phase
      - name: Package Release Assets (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Compress the portable single-folder build
          Compress-Archive -Path dist\AuraPlayer -DestinationPath ${{ matrix.artifact_name }}

      - name: Package Release Assets (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # macOS outputs standard single-folder or app bundle
          # Zip the main build output folder
          zip -r ${{ matrix.artifact_name }} dist/AuraPlayer

      - name: Package Release Assets (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # Tar/Gzip the Linux build folder
          tar -czf ${{ matrix.artifact_name }} -C dist AuraPlayer

      # Release Phase
      - name: Upload Release Binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          fail_on_unmatched_files: false
          files: |
            ${{ matrix.artifact_name }}
            dist/AuraPlayer_Setup_*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
